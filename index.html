<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>寄せ書き</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

  <!-- タイトル -->
  <h1 class="title">Happy Anniversary</h1>
  <p class="subtitle">これからも素敵な時間を一緒に</p>

  <!-- メイン画像 -->
  <div class="container" id="container">
    <img src="family.jpg">
  </div>

  <!-- 下メッセージ -->
  <p class="footer-message">
    みんなからの感謝と愛を込めて
  </p>

</div>

<!-- 開発用（非表示でもOK） -->
<div class="dev-panel">
  <button id="toggleBtn">座標取得モード: OFF</button>
  <pre id="output"></pre>
</div>

<script src="script.js"></script>

</body>
</html>

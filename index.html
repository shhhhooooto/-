<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>寄せ書き</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

  <!-- タイトル -->
  <h1 class="title">Happy Anniversary</h1>
  <p class="subtitle">これからも素敵な時間を一緒に</p>

  <!-- メイン画像 -->
  <div class="container" id="container">
    <img src="family.jpg">
  </div>

  <!-- 下メッセージ -->
  <p class="footer-message">
    みんなからの感謝と愛を込めて
  </p>

</div>

<div class="decorations">
  <img src="photo1.jpeg" class="polaroid p1">
  <img src="photo2.jpeg" class="polaroid p2">
  <img src="photo3.jpeg" class="polaroid p3">
  <img src="photo4.jpeg" class="polaroid p4">
</div>

<section class="timeline">
  <h2 class="timeline-title">Our Story</h2>

  <div class="timeline-line"></div>

  <div class="timeline-item">
    <div class="timeline-content">
      <span class="year">2020</span>
      <p>ごう誕生</p>
    </div>
  </div>

  <div class="timeline-item">
    <div class="timeline-content">
      <span class="year">2021</span>
      <p>おばあちゃんが80歳になる</p>
    </div>
  </div>

  <div class="timeline-item">
    <div class="timeline-content">
      <span class="year">2026</span>
      <p>結婚60周年</p>
    </div>
  </div>
</section>

<!-- 開発用（非表示でもOK） -->

  <button id="toggleBtn">座標取得モード: OFF</button>
  <pre id="output"></pre>
</div> -->

<script src="script.js"></script>

</body>
</html>
